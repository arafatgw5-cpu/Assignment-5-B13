<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>

    <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />

    <!-- Tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-lg shadow-lg w-96">
<img src="./assets/github-logo.png" alt="GitHub Logo" class="mx-auto w-14 ">
<h1 class="text-2xl font-bold text-center mb-2">GitHub Issues Tracker</h1>
<p class="text-center text-gray-500 mb-6">Sign in to manage your issues</p>

<input id="username" type="text" placeholder="Username" class="input input-bordered w-full mb-4">

<input id="password" type="password" placeholder="Password" class="input input-bordered w-full mb-4">

<button onclick="handleLogin()" class="btn btn-primary w-full">Sign In</button>

<p class="text-sm text-gray-500 mt-4 text-center">
Demo → admin / admin123
</p>

</div>

<script src="script.js"></script>

</body>
</html>
