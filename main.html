<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Issues</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet"/>

</head>

<body class="bg-gray-100">

<!-- Navbar -->

<div class="navbar bg-white shadow px-6">
<img src="./assets/github-logo.png" alt="" srcset="">
<div class="flex-1 text-xl font-bold">
GitHub Issues Tracker
</div>

<div class="flex gap-2">

<input id="searchInput" type="text" placeholder="Search" class="input input-bordered">

<button onclick="searchIssues()" class="btn btn-primary">
+New Issue
</button>

</div>

</div>

<!-- Tabs -->

<div class="flex  gap-4 mt-6">

<button onclick="loadAll()" class="btn btn-outline">All</button>

<button onclick="loadOpen()" class="btn btn-outline">Open</button>

<button onclick="loadClosed()" class="btn btn-outline">Closed</button>

</div>

<!-- Loader -->

<div id="loader" class="text-center mt-10 hidden">

<span class="loading loading-spinner loading-lg"></span>

</div>

<!-- Issues Grid -->

<div id="issuesContainer"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 p-6">
</div>

<!-- Modal -->

<dialog id="issueModal" class="modal">

<div class="modal-box">

<h3 id="modalTitle" class="font-bold text-lg"></h3>

<p id="modalDescription" class="py-2"></p>

<p id="modalStatus"></p>
<p id="modalAuthor"></p>
<p id="modalPriority"></p>
<p id="modalLabel"></p>
<p id="modalCreated"></p>

<div class="modal-action">

<form method="dialog">
<button class="btn">Close</button>
</form>

</div>

</div>

</dialog>

<script src="script.js"></script>

</body>
</html>
