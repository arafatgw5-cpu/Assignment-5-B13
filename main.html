<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Issues Tracker</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet"/>

</head>

<body class="bg-gray-100">

<!-- Navbar -->
<div class="navbar bg-white shadow px-6 gap-2">
<img src="./assets/github-logo.png" class="w-10">

<div class="flex-1 text-xl font-bold">
GitHub Issues Tracker
</div>

<div class="flex gap-2">
<input id="searchInput" type="text" placeholder="Search" class="input input-bordered">
<button onclick="searchIssues()" class="btn btn-primary">Search</button>
</div>
</div>


<!-- Issues Summary -->
<div class="px-6 mt-6">
<div class="bg-white shadow rounded-xl p-4 flex justify-between items-center">

<div class="flex items-center gap-3">

<div class="w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center">
<span class="text-purple-600 text-xl">⚙</span>
</div>

<div>
<h2 id="totalIssues" class="font-bold text-lg">0 Issues</h2>
<p class="text-gray-500 text-sm">
Track and manage your project issues
</p>
</div>

</div>

<div class="flex gap-6 text-sm">

<div class="flex items-center gap-2">
<span class="w-3 h-3 bg-green-500 rounded-full"></span>
<span id="openCount">0 Open</span>
</div>

<div class="flex items-center gap-2">
<span class="w-3 h-3 bg-purple-500 rounded-full"></span>
<span id="closedCount">0 Closed</span>
</div>

</div>

</div>
</div>


<!-- Tabs -->
<div class="flex gap-4 mt-6 px-6">

<button id="allBtn" class="btn btn-outline">
All
</button>

<button id="openBtn" class="btn btn-outline">
Open
</button>

<button id="closedBtn" class="btn btn-outline">
Closed
</button>

</div>


<!-- Loader -->
<div id="loader" class="text-center mt-10 hidden">
<span class="loading loading-spinner loading-lg"></span>
</div>


<!-- Issues Grid -->
<div id="issuesContainer"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 p-6">
</div>



<!-- Modal -->
<dialog id="issueModal" class="modal">

<div class="modal-box">

<h3 id="modalTitle" class="font-bold text-lg"></h3>

<p id="modalDescription" class="py-2"></p>

<p id="modalStatus"></p>
<p id="modalAuthor"></p>
<p id="modalPriority"></p>
<p id="modalLabel"></p>
<p id="modalCreated"></p>

<div class="modal-action">
<form method="dialog">
<button class="btn">Close</button>
</form>
</div>

</div>

</dialog>

<script src="script.js"></script>

</body>
</html>
